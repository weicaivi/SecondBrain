  youtube:
    enabled: false
    api_key: "YOUR_YOUTUBE_API_KEY"
    # Get at: https://console.cloud.google.com → YouTube Data API v3
    channels:
      - channel_id: "CHANNEL_ID_HERE"
        display_name: "Channel Name"
      # To find a channel ID: go to the channel page, view source, search "channelId"
      # Or use https://www.youtube.com/@handle — the ID is in the URL for older channels

  weibo:
    enabled: false
    access_token: "YOUR_WEIBO_ACCESS_TOKEN"
    # Get at: https://open.weibo.com → create an app
    following:
      - uid: "WEIBO_USER_ID"
        display_name: "Display Name"
      # Find UID: go to a user's profile, the number in the URL is their UID

  threads:
    enabled: false
    access_token: "YOUR_THREADS_ACCESS_TOKEN"
    # Get at: https://developers.facebook.com → Threads API
    # NOTE: Threads API only shows posts from accounts that authorize your app.
    # For public following, use RSS workarounds (see README).
    following:
      - user_id: "THREADS_USER_ID"
        display_name: "Display Name"

  xiaohongshu:
    enabled: false
    # Uses xhs-cli (github.com/jackwener/xhs-cli) — no API key needed.
    # One-time setup:
    #   uv tool install xhs-cli   (or: pipx install xhs-cli)
    #   xhs login                 (extracts cookies from your browser automatically)
    # New posts are detected via a seen-ID cache (_System/Scripts/.xhs_seen.json).
    following:
      - user_id: "XHS_USER_ID"
        display_name: "Display Name"
      # Find user ID: open a creator's profile in browser, copy the ID from the URL
      # e.g. xiaohongshu.com/user/profile/60a1b2c3d4e5f6 → user_id: "60a1b2c3d4e5f6"
